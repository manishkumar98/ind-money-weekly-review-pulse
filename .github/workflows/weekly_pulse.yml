name: INDmoney Weekly Pulse

on:
  schedule:
    # Every Saturday at 10:00 AM IST (04:30 UTC)
    - cron: '30 4 * * 6'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-weekly-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from GitHub Secrets
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EOF

      - name: Log run start
        run: |
          mkdir -p logs
          echo "========================================" >> logs/scheduler.log
          echo "Run Date     : $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')" >> logs/scheduler.log
          echo "Triggered by : ${{ github.event_name }}" >> logs/scheduler.log
          echo "Commit SHA   : ${{ github.sha }}" >> logs/scheduler.log
          echo "Status       : STARTED" >> logs/scheduler.log

      - name: Run full pipeline (Phases 1-3)
        id: pipeline
        run: printf "Y\nY\n" | python Phase4_Orchestration/main_orchestrator.py

      - name: Send weekly email
        id: email
        run: python Phase5_Email_UI/email_sender.py "${{ secrets.EMAIL_SENDER }}"

      - name: Log run result
        if: always()
        run: |
          if [ "${{ steps.pipeline.outcome }}" == "success" ] && [ "${{ steps.email.outcome }}" == "success" ]; then
            echo "Pipeline     : SUCCESS" >> logs/scheduler.log
            echo "Email Sent   : SUCCESS -> ${{ secrets.EMAIL_SENDER }}" >> logs/scheduler.log
            echo "Result       : COMPLETED" >> logs/scheduler.log
          else
            echo "Pipeline     : ${{ steps.pipeline.outcome }}" >> logs/scheduler.log
            echo "Email Sent   : ${{ steps.email.outcome }}" >> logs/scheduler.log
            echo "Result       : FAILED" >> logs/scheduler.log
          fi
          echo "========================================" >> logs/scheduler.log
          echo "" >> logs/scheduler.log
          cat logs/scheduler.log

      - name: Upload pipeline outputs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-outputs
          path: |
            Phase2_LLM_Processing/weekly_pulse_output.json
            Phase2_LLM_Processing/fee_explanation.json
            Phase3_MCP_Integration/email_draft.txt
            Phase3_MCP_Integration/weekly_pulse_notes.md
            Phase5_Email_UI/poster.html
            logs/scheduler.log
          retention-days: 30
