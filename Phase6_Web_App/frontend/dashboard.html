                    <div style="margin-top:12px;font-size:13px;color:rgba(255,255,255,0.55)">Last checked: ${escapeHtml(FEE_DATA.last_checked)}</div>
                    <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
                        ${FEE_DATA.source_links.map(l => `<a href="${l}" target="_blank" rel="noopener" style="color:#a5b4fc;font-size:13px;word-break:break-all">${escapeHtml(l)}</a>`).join('')}
                    </div>
                </div>` : ''}`;
        });

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            btn.classList.add('active');
        }

        async function sendEmail() {
            const name = document.getElementById('send-name').value.trim();
            const email = document.getElementById('send-email').value.trim();
            const btn = document.getElementById('send-btn');
            const status = document.getElementById('send-status');

            if (!name || !email) { status.textContent = 'Please enter both name and email.'; status.className = 'status-msg error'; return; }

            btn.disabled = true;
            btn.innerHTML = 'Sending... <span class="spinner-inline"></span>';
            status.textContent = '';
            status.className = 'status-msg';

            try {
                const res = await fetch(`${API}/api/send-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });
                const data = await res.json();
                if (res.ok) {
                    status.textContent = `✅ Email sent to ${email}!`;
                    status.className = 'status-msg success';
                    document.getElementById('send-name').value = '';
                    document.getElementById('send-email').value = '';
                } else {
                    status.textContent = data.detail || 'Failed to send email.';
                    status.className = 'status-msg error';
                }
            } catch (e) {
                status.textContent = '❌ Failed to connect to server.';
                status.className = 'status-msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Email 🚀';
            }
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
